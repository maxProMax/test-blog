name: Deploy Blog

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{steps.deploy-frontend.outputs.url}}
    steps:
      - uses: actions/checkout@v3
      - name: Login Docker
        uses: docker/login-action@v2
        with:
          username: ${{secrets.DOCKERHUB_USERNAME}}
          password: ${{secrets.DOCKERHUB_TOKEN}}
      - uses: google-github-actions/auth@v1
        with:
          # service_account: ${{secrets.GOOGLECLOUD_SERVICE_ACCOUNT}}
          credentials_json: ${{secrets.GOOGLECLOUD_SERVICE_CREDENTIALS}}
      - name: Build and publish backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{secrets.DOCKERHUB_USERNAME}}/blog-backend:latest
      - id: deploy-backend
        name: Deploy backend
        uses: google-github-actions/deploy-cloudrun@v1
        with:
          service: blog-backend
          image: ${{secrets.DOCKERHUB_USERNAME}}/blog-backend:latest
          region: ${{secrets.DOCKERHUB_REGION}}
      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{secrets.DOCKERHUB_USERNAME}}/blog-frontend:latest
          build-args: VITE_BACKEND_URL=${{steps.deploy-backend.outputs.url}}
          run: echo ${{steps.deploy-backend.outputs.url}}
      - id: deploy-frontend
        name: Deploy frontend
        uses: google-github-actions/deploy-cloudrun@v1
        with:
          service: blog-frontend
          image: ${{secrets.DOCKERHUB_USERNAME}}/blog-frontend:latest
          region: ${{secrets.DOCKERHUB_REGION}}

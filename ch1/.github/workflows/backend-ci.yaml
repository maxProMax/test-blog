name: Blog Backend ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v3
      - name: Use Node js
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'
          cache: 'npm'
      - name: Install dependencies
        run: npm i
      - name: lint
        run: npm run lint
      - name: tests
        run: npm run test
